name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render server
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" https://qarz-bot-b4z8.onrender.com/health)
          echo "Status: $code"
