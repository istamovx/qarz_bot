<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Qarz Bot</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#09090f;
  --s1:rgba(255,255,255,0.05);
  --s2:rgba(255,255,255,0.08);
  --s3:rgba(255,255,255,0.12);
  --border:rgba(255,255,255,0.07);
  --v:#7C5CFC;
  --v2:#A78BFA;
  --v3:#5E35B1;
  --grad:linear-gradient(135deg,#5E35B1 0%,#7C5CFC 50%,#A78BFA 100%);
  --green:#00C9A7;
  --red:#FF6B6B;
  --yellow:#FFD93D;
  --txt:#F0EFFF;
  --txt2:#5E5E80;
  --txt3:#8888AA;
  --r:20px;
  --shadow:0 8px 32px rgba(124,92,252,0.18);
  --bal-color:#fff;
  --bnav-bg:rgba(12,12,22,0.95);
  --subhd-bg:rgba(9,9,15,0.9);
  --toast-bg:rgba(30,30,50,0.95);
  --det-bg:#09090f;
}
body.light{
  --bg:#f2f2f8;
  --s1:rgba(0,0,0,0.045);
  --s2:rgba(0,0,0,0.075);
  --s3:rgba(0,0,0,0.12);
  --border:rgba(0,0,0,0.08);
  --txt:#1a1a2e;
  --txt2:#9090b0;
  --txt3:#7070a0;
  --shadow:0 8px 32px rgba(124,92,252,0.10);
  --bal-color:#1a1a2e;
  --bnav-bg:rgba(238,238,248,0.96);
  --subhd-bg:rgba(242,242,248,0.92);
  --toast-bg:rgba(215,215,232,0.97);
  --det-bg:#eeeef6;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;display:flex;flex-direction:column}

#app{flex:1;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;overflow-y:auto;display:none;padding-bottom:80px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.screen::-webkit-scrollbar{display:none}
.screen.active{display:block}

/* ─ Bottom Nav ── */
.bnav{display:flex;background:var(--bnav-bg);border-top:1px solid var(--border);padding:6px 8px max(10px,env(safe-area-inset-bottom));backdrop-filter:blur(20px);position:relative;z-index:10;flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;background:none;border:none;color:var(--txt2);font-size:10px;font-weight:600;cursor:pointer;border-radius:14px;transition:all .2s;position:relative;user-select:none}
.nb i{font-size:22px;line-height:1;transition:color .2s}
.nb.on{color:var(--v2)}
.nb.on i{color:var(--v2)}
.nb.on::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--grad);border-radius:0 0 4px 4px}

/* ─ Home Header ── */
.home-hd{padding:12px 20px 0;position:relative;overflow:hidden}
.hd-bg{position:absolute;inset:0;background:var(--grad);opacity:.12;pointer-events:none}
.hd-orb{position:absolute;border-radius:50%;pointer-events:none}
.hd-orb.a{width:220px;height:220px;background:radial-gradient(circle,rgba(124,92,252,.3),transparent 70%);top:-80px;right:-60px}
.hd-orb.b{width:160px;height:160px;background:radial-gradient(circle,rgba(94,53,177,.25),transparent 70%);bottom:-60px;left:-40px}
.hd-top{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;padding-bottom:12px}
.hd-user{display:flex;align-items:center;gap:12px}
.hd-av{width:44px;height:44px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;box-shadow:var(--shadow);flex-shrink:0}
.hd-greet{font-size:12px;color:var(--txt3);margin-bottom:2px}
.hd-name{font-size:16px;font-weight:700}
.theme-btn{width:36px;height:36px;border-radius:50%;background:var(--s1);border:1px solid var(--border);color:var(--txt3);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .2s}
.theme-btn i{font-size:18px}

/* Balance card */
.bal-card{background:rgba(124,92,252,0.1);border:1px solid rgba(124,92,252,0.2);border-radius:24px;padding:12px;margin:12px;backdrop-filter:blur(20px);position:relative;overflow:hidden}
.bal-card::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(124,92,252,.15),transparent 70%);right:-60px;top:-60px;pointer-events:none}
.bal-label{font-size:13px;color:var(--txt3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.bal-label i{font-size:15px;color:var(--v2)}
.bal-amt{font-size:36px;font-weight:800;letter-spacing:-1.5px;margin-bottom:12px;color:var(--bal-color)}
.bal-amt.neg{color:var(--red)}
.bal-row{display:flex;gap:8px}
.bal-pill{flex:1;min-width:0;background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:12px;display:flex;align-items:center;gap:8px;overflow:hidden}
.bal-pill i{font-size:18px;flex-shrink:0}
.bal-pill.gave i{color:var(--v2)}
.bal-pill.took i{color:var(--green)}
.bp-info{flex:1;min-width:0}
.bp-label{font-size:11px;color:var(--txt3);margin-bottom:2px}
.bp-val{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Quick actions */
.acts{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 20px}
.act{display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 6px;background:var(--s1);border:1px solid var(--border);border-radius:18px;cursor:pointer;color:var(--txt);font-size:11px;font-weight:600;transition:transform .15s,background .15s;user-select:none}
.act:active{transform:scale(.93);background:var(--s2)}
.act-ic{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.act-ic i{font-size:20px}
.act-ic.v{background:rgba(124,92,252,.18)} .act-ic.v i{color:var(--v2)}
.act-ic.g{background:rgba(0,201,167,.15)} .act-ic.g i{color:var(--green)}
.act-ic.b{background:rgba(94,129,244,.15)} .act-ic.b i{color:#5E81F4}
.act-ic.y{background:rgba(255,217,61,.12)} .act-ic.y i{color:var(--yellow)}

/* Section */
.sec-hd{display:flex;justify-content:space-between;align-items:center;padding:4px 20px 10px}
.sec-hd h3{font-size:16px;font-weight:700}
.sec-hd a{font-size:13px;color:var(--v2);cursor:pointer;display:flex;align-items:center;gap:2px}
.sec-hd a i{font-size:14px}

/* Loan cards */
.lst{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.lcard{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px 15px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:transform .15s,background .15s;position:relative;overflow:hidden}
.lcard:active{transform:scale(.98);background:var(--s2)}
.lcard.overdue{border-left:2.5px solid var(--red)}
.lcard.soon{border-left:2.5px solid var(--yellow)}
.lcard-ic{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lcard-ic i{font-size:22px}
.lcard-ic.gave{background:rgba(124,92,252,.15)} .lcard-ic.gave i{color:var(--v2)}
.lcard-ic.took{background:rgba(0,201,167,.12)} .lcard-ic.took i{color:var(--green)}
.lcard-ic.paid{background:rgba(255,255,255,.06)} .lcard-ic.paid i{color:var(--txt3)}
.lcard-body{flex:1;min-width:0}
.lcard-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.lcard-sub{font-size:12px;color:var(--txt3);display:flex;align-items:center;gap:4px}
.lcard-sub i{font-size:13px}
.lcard-sub.red{color:var(--red)}
.lcard-sub.yel{color:var(--yellow)}
.lcard-right{text-align:right;flex-shrink:0}
.lcard-amt{font-size:15px;font-weight:700;margin-bottom:2px}
.lcard-amt.gave{color:var(--v2)}
.lcard-amt.took{color:var(--green)}
.lcard-cur{font-size:11px;color:var(--txt3)}

/* Empty */
.empty{text-align:center;padding:52px 20px;color:var(--txt3)}
.empty i{font-size:52px;color:var(--txt2);margin-bottom:14px;display:block}
.empty p{font-size:15px}

/* Spinner */
.spn-w{display:flex;justify-content:center;align-items:center;padding:48px}
.spn{width:32px;height:32px;border:3px solid var(--s2);border-top-color:var(--v2);border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* Sub header */
.sub-hd{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--subhd-bg);backdrop-filter:blur(12px);z-index:5}
.sub-hd h2{font-size:17px;font-weight:700;flex:1}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--s1);border:1px solid var(--border);color:var(--txt);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.back-btn i{font-size:20px}

/* Tabs */
.tabs{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 18px;border-radius:20px;border:1px solid var(--border);background:var(--s1);color:var(--txt3);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0}
.tab i{font-size:14px}
.tab.on{background:var(--v);border-color:var(--v);color:#fff}

.amt-box{margin:0 16px;background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:16px;text-align:center;position:relative;overflow:hidden}
.amt-box::before{content:'';position:absolute;width:180px;height:180px;border-radius:50%;opacity:.08;right:-60px;top:-60px;pointer-events:none}
.amt-box.gave::before{background:var(--v)}
.amt-box.took::before{background:var(--green)}
.amt-num{font-size:36px;font-weight:800;letter-spacing:-1.5px;line-height:1.1;transition:color .2s;min-height:44px}
.amt-num.gave{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.amt-num.took{background:linear-gradient(135deg,#00C9A7,#4CD9BE);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.amt-cur{font-size:13px;color:var(--txt3);margin-top:4px;font-weight:500}

/* Fields */
.fields{padding:10px 16px;display:flex;flex-direction:column;gap:8px}
.field{position:relative}
.field-ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:18px;pointer-events:none;z-index:1}
.finput{background:var(--s1);border:1.5px solid var(--border);border-radius:16px;padding:13px 14px 13px 42px;color:var(--txt);font-size:15px;outline:none;width:100%;transition:border-color .2s,background .2s;-webkit-appearance:none;font-family:inherit}
.finput:focus{border-color:var(--v);background:var(--s2)}
.finput::placeholder{color:var(--txt3)}
.finput[type=date]{color-scheme:dark}

/* Numpad */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 16px}
.np{background:var(--s1);border:1px solid var(--border);border-radius:18px;color:var(--txt);font-size:22px;font-weight:700;height:56px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s,background .1s;user-select:none;font-family:inherit}
.np:active{transform:scale(.9);background:var(--s3)}
.np.del i{font-size:20px;color:var(--txt3)}
.np-zero{font-size:20px}

/* Save button */
.save-btn{margin:8px 16px 0;padding:16px;background:var(--grad);border:none;border-radius:18px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;width:calc(100% - 32px);transition:opacity .2s,transform .1s;box-shadow:0 8px 24px rgba(124,92,252,.35);display:flex;align-items:center;justify-content:center;gap:8px}
.save-btn i{font-size:20px}
.save-btn:active{transform:scale(.98);opacity:.9}
.save-btn:disabled{opacity:.4;box-shadow:none}

/* ─ Detail sheet ── */
.det-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(8px)}
.det-ov.open{display:flex}
.det{background:var(--det-bg);border-radius:28px 28px 0 0;padding:24px 22px max(22px,env(safe-area-inset-bottom));width:100%;animation:slideUp .28s cubic-bezier(.32,1.2,.45,1)}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.det-badge{display:inline-flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;color:var(--txt3);margin-bottom:14px}
.det-badge i{font-size:15px}
.det-badge.gave i{color:var(--v2)}
.det-badge.took i{color:var(--green)}
.det-name{font-size:24px;font-weight:800;margin-bottom:6px}
.det-amt{font-size:38px;font-weight:900;letter-spacing:-1.5px;margin-bottom:18px}
.det-amt.gave{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.det-amt.took{background:linear-gradient(135deg,#00C9A7,#4CD9BE);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.det-info{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.det-row{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--txt3)}
.det-row i{font-size:17px;width:20px;text-align:center;flex-shrink:0}
.det-divider{height:1px;background:var(--border);margin:16px 0}
.det-btns{display:flex;gap:10px}
.det-paid{flex:1;padding:16px;background:linear-gradient(135deg,#00C9A7,#00A88C);border:none;border-radius:16px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 6px 20px rgba(0,201,167,.3);transition:opacity .2s}
.det-paid i{font-size:18px}
.det-paid:active{opacity:.85}
.det-close{padding:16px 18px;background:var(--s1);border:1px solid var(--border);border-radius:16px;color:var(--txt3);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.det-close i{font-size:18px}

/* Toast */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--toast-bg);color:var(--txt);padding:12px 22px;border-radius:28px;font-size:14px;font-weight:600;opacity:0;transition:all .3s cubic-bezier(.32,1.2,.45,1);z-index:999;white-space:nowrap;pointer-events:none;backdrop-filter:blur(20px);border:1px solid var(--border);display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.divider{height:1px;background:var(--border);margin:0 16px 12px}
body.light .finput[type=date]{color-scheme:light}
</style>
</head>
<body>

<div id="app">

  <!-- HOME -->
  <div id="s-home" class="screen active">
    <div class="home-hd">
      <div class="hd-bg"></div>
      <div class="hd-orb a"></div>
      <div class="hd-orb b"></div>
      <div class="hd-top">
        <div class="hd-user">
          <div class="hd-av" id="av">?</div>
          <div>
            <div class="hd-greet" id="hd-greet">Xush kelibsiz</div>
            <div class="hd-name" id="uname">...</div>
          </div>
        </div>
        <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">
          <i class="ri-moon-line" id="theme-ic"></i>
        </button>
      </div>
    </div>

    <div class="bal-card" id="bal-card">
      <div class="bal-label"><i class="ri-wallet-3-line"></i> <span id="bal-lbl">Umumiy balans</span></div>
      <div class="bal-amt" id="bal-amt">— so'm</div>
      <div class="bal-row">
        <div class="bal-pill gave">
          <i class="ri-arrow-up-circle-fill"></i>
          <div class="bp-info">
            <div class="bp-label" id="lent-lbl">Berganlar</div>
            <div class="bp-val" id="s-gave">—</div>
          </div>
        </div>
        <div class="bal-pill took">
          <i class="ri-arrow-down-circle-fill"></i>
          <div class="bp-info">
            <div class="bp-label" id="borrow-lbl">Olganlar</div>
            <div class="bp-val" id="s-took">—</div>
          </div>
        </div>
      </div>
    </div>

    <div class="acts">
      <button class="act" onclick="openAdd('gave')">
        <div class="act-ic v"><i class="ri-send-plane-fill"></i></div>
        <span id="act-lend">Berdim</span>
      </button>
      <button class="act" onclick="openAdd('took')">
        <div class="act-ic g"><i class="ri-download-fill"></i></div>
        <span id="act-borrow">Oldim</span>
      </button>
      <button class="act" onclick="goLoans()">
        <div class="act-ic b"><i class="ri-list-check-3"></i></div>
        <span id="act-list">Ro'yxat</span>
      </button>
      <button class="act" onclick="goHist()">
        <div class="act-ic y"><i class="ri-history-line"></i></div>
        <span id="act-hist">Tarix</span>
      </button>
    </div>

    <div class="sec-hd">
      <h3 id="sec-title">So'nggi qarzlar</h3>
      <a onclick="goLoans()"><span id="sec-all">Barchasi</span> <i class="ri-arrow-right-s-line"></i></a>
    </div>
    <div class="lst" id="home-lst"><div class="spn-w"><div class="spn"></div></div></div>
    <div style="height:8px"></div>
  </div>

  <!-- LOANS -->
  <div id="s-loans" class="screen">
    <div class="sub-hd">
      <button class="back-btn" onclick="goHome()"><i class="ri-arrow-left-s-line"></i></button>
      <h2 id="loans-title">Qarzlar</h2>
    </div>
    <div class="tabs">
      <button class="tab on" id="tab-all" onclick="filt('all',this)"><i class="ri-apps-2-line"></i><span>Barchasi</span></button>
      <button class="tab" id="tab-gave" onclick="filt('gave',this)"><i class="ri-arrow-up-circle-line"></i><span>Berganlar</span></button>
      <button class="tab" id="tab-took" onclick="filt('took',this)"><i class="ri-arrow-down-circle-line"></i><span>Olganlar</span></button>
    </div>
    <div class="lst" id="loans-lst"><div class="spn-w"><div class="spn"></div></div></div>
  </div>

  <!-- HISTORY -->
  <div id="s-hist" class="screen">
    <div class="sub-hd">
      <button class="back-btn" onclick="goHome()"><i class="ri-arrow-left-s-line"></i></button>
      <h2 id="hist-title-el">Tarix</h2>
    </div>
    <div class="lst" id="hist-lst" style="margin-top:14px"><div class="spn-w"><div class="spn"></div></div></div>
  </div>

  <!-- ADD -->
  <div id="s-add" class="screen">
    <div class="sub-hd">
      <button class="back-btn" onclick="closeAdd()"><i class="ri-arrow-left-s-line"></i></button>
      <h2 id="m-title">Qarz berdim</h2>
    </div>
    <div class="amt-box gave" id="amt-box">
      <div class="amt-num gave" id="amt-d">0</div>
      <div class="amt-cur">so'm</div>
    </div>
    <div class="fields">
      <div class="field">
        <i class="ri-user-3-line field-ic"></i>
        <input class="finput" id="f-p" type="text" placeholder="Kimga / Kimdan?" autocomplete="off" autocorrect="off" autocapitalize="words">
      </div>
      <div class="field">
        <i class="ri-calendar-event-line field-ic"></i>
        <input class="finput" id="f-dt" type="date">
      </div>
    </div>
    <div class="numpad">
      <button class="np" onclick="np('1')">1</button>
      <button class="np" onclick="np('2')">2</button>
      <button class="np" onclick="np('3')">3</button>
      <button class="np" onclick="np('4')">4</button>
      <button class="np" onclick="np('5')">5</button>
      <button class="np" onclick="np('6')">6</button>
      <button class="np" onclick="np('7')">7</button>
      <button class="np" onclick="np('8')">8</button>
      <button class="np" onclick="np('9')">9</button>
      <button class="np np-zero" onclick="np('000')">000</button>
      <button class="np" onclick="np('0')">0</button>
      <button class="np del" onclick="np('del')"><i class="ri-delete-back-2-line"></i></button>
    </div>
    <button class="save-btn" id="sv-btn" onclick="saveLoan()">
      <i class="ri-check-line"></i> Saqlash
    </button>
    <div style="height:12px"></div>
  </div>

</div>

<!-- Bottom Nav -->
<nav class="bnav">
  <button class="nb on" id="nb-home" onclick="goHome()">
    <i class="ri-home-5-fill"></i>Asosiy
  </button>
  <button class="nb" id="nb-gave" onclick="goLoans('gave')">
    <i class="ri-arrow-up-circle-line"></i><span id="nb-gave-lbl">Berganlar</span>
  </button>
  <button class="nb" id="nb-took" onclick="goLoans('took')">
    <i class="ri-arrow-down-circle-line"></i><span id="nb-took-lbl">Olganlar</span>
  </button>
  <button class="nb" id="nb-hist" onclick="goHist()">
    <i class="ri-history-line"></i><span id="nb-hist-lbl">Tarix</span>
  </button>
</nav>

<!-- Detail Sheet -->
<div class="det-ov" id="det-ov">
  <div class="det">
    <div class="det-badge" id="d-badge"><i class="ri-send-plane-fill"></i> <span id="d-type-txt">Bergan</span></div>
    <div class="det-name" id="d-name"></div>
    <div class="det-amt" id="d-amt"></div>
    <div class="det-info">
      <div class="det-row" id="d-desc" style="display:none"><i class="ri-sticky-note-line"></i><span></span></div>
      <div class="det-row" id="d-date" style="display:none"><i class="ri-calendar-event-line"></i><span></span></div>
      <div class="det-row" id="d-when"><i class="ri-time-line"></i><span></span></div>
    </div>
    <div class="det-divider"></div>
    <div class="det-btns">
      <button class="det-paid" onclick="doPaid()"><i class="ri-check-double-line"></i> <span id="det-paid-txt">To'landi</span></button>
      <button class="det-close" onclick="closeDet()"><i class="ri-close-line"></i></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if(tg){tg.expand();tg.setBackgroundColor?.('#09090f');tg.setHeaderColor?.('#09090f');tg.disableVerticalSwipes?.();}

const initData = tg?.initData||'';
const tgUser = tg?.initDataUnsafe?.user||{};
let amtStr='', curType='gave', lmap={}, curFilt='all', sel=null, appReady=false, isDark=true;

// ── i18n ──
const T_ALL = {
  uz:{
    greeting:'Xush kelibsiz', balance:'Umumiy balans', lent:'Berganlar', borrowed:'Olganlar',
    recent:"So'nggi qarzlar", seeAll:'Barchasi', lendAct:'Berdim', borrowAct:'Oldim',
    listTab:'Ro\'yxat', histTab:'Tarix', loans:'Qarzlar', all:'Barchasi',
    lendBtn:'Berganlar', borrowBtn:'Olganlar',
    addLend:'💸 Qarz berdim', addBorrow:'🤝 Qarz oldim',
    namePh:"Kimga / Kimdan?", save:'Saqlash', saving:'Saqlanmoqda...',
    noName:'👤 Ism kiriting!', noAmt:'💰 Miqdor kiriting!',
    savedLend:'💸 Qarz berish qayd etildi!', savedBorrow:'🤝 Qarz olish qayd etildi!',
    err:'⚠️ Xato yuz berdi', noLoans:"Hozircha qarz yo'q!", noPaid:"To'langan qarzlar yo'q",
    netErr:"Xato yuz berdi. Qayta urinib ko'ring",
    today:'Bugun qaytarish kerak!', overdue:"Muddati o'tgan ({n} kun)", soon:'{n} kun qoldi',
    paid:"✅ To'landi!", paidType:"To'langan",
    lentType:'Bergan qarz', borrowType:'Olgan qarz',
    dueLabel:'Muddat: ', addedLabel:"Qo'shilgan: ", markPaid:"To'landi", sum:"so'm", home:'Asosiy',
  },
  ru:{
    greeting:'Добро пожаловать', balance:'Общий баланс', lent:'Выдано', borrowed:'Взято',
    recent:'Последние долги', seeAll:'Все', lendAct:'Дал', borrowAct:'Взял',
    listTab:'Список', histTab:'История', loans:'Долги', all:'Все',
    lendBtn:'Выдано', borrowBtn:'Взято',
    addLend:'💸 Дал в долг', addBorrow:'🤝 Взял в долг',
    namePh:'Кому / От кого?', save:'Сохранить', saving:'Сохранение...',
    noName:'👤 Введите имя!', noAmt:'💰 Введите сумму!',
    savedLend:'💸 Долг записан!', savedBorrow:'🤝 Долг записан!',
    err:'⚠️ Произошла ошибка', noLoans:'Пока нет долгов!', noPaid:'Нет оплаченных долгов',
    netErr:'Ошибка. Попробуйте снова',
    today:'Срок истекает сегодня!', overdue:'Просрочен ({n} дн.)', soon:'Осталось {n} дн.',
    paid:'✅ Оплачено!', paidType:'Оплачено',
    lentType:'Выданный долг', borrowType:'Взятый долг',
    dueLabel:'Срок: ', addedLabel:'Добавлен: ', markPaid:'Оплачено', sum:'сум', home:'Главная',
  },
  en:{
    greeting:'Welcome', balance:'Total balance', lent:'Lent', borrowed:'Borrowed',
    recent:'Recent loans', seeAll:'See all', lendAct:'Lent', borrowAct:'Borrowed',
    listTab:'List', histTab:'History', loans:'Loans', all:'All',
    lendBtn:'Lent', borrowBtn:'Borrowed',
    addLend:'💸 I lent money', addBorrow:'🤝 I borrowed',
    namePh:'To / From whom?', save:'Save', saving:'Saving...',
    noName:'👤 Enter a name!', noAmt:'💰 Enter an amount!',
    savedLend:'💸 Loan recorded!', savedBorrow:'🤝 Debt recorded!',
    err:'⚠️ An error occurred', noLoans:'No loans yet!', noPaid:'No paid loans',
    netErr:'Error. Please try again',
    today:'Due today!', overdue:'Overdue ({n} days)', soon:'{n} days left',
    paid:'✅ Paid!', paidType:'Paid',
    lentType:'Lent loan', borrowType:'Borrowed loan',
    dueLabel:'Due: ', addedLabel:'Added: ', markPaid:'Mark paid', sum:'sum', home:'Home',
  },
};
let T = T_ALL.uz;

function detectLang(code){
  if(!code) return 'uz';
  if(code.startsWith('ru')) return 'ru';
  if(code.startsWith('uz')) return 'uz';
  return 'en';
}

function initTheme(){
  const saved=localStorage.getItem('theme');
  isDark = saved ? saved==='dark' : tg?.colorScheme!=='light';
  applyTheme();
}
function toggleTheme(){
  isDark=!isDark;
  localStorage.setItem('theme',isDark?'dark':'light');
  applyTheme();
}
function applyTheme(){
  document.body.classList.toggle('light',!isDark);
  document.getElementById('theme-ic').className=isDark?'ri-moon-line':'ri-sun-line';
  const bg=isDark?'#09090f':'#f2f2f8';
  tg?.setBackgroundColor?.(bg);
  tg?.setHeaderColor?.(bg);
}
function applyLang(lang){
  T = T_ALL[lang] || T_ALL.uz;
  document.getElementById('hd-greet').textContent  = T.greeting;
  document.getElementById('bal-lbl').textContent    = T.balance;
  document.getElementById('lent-lbl').textContent   = T.lent;
  document.getElementById('borrow-lbl').textContent = T.borrowed;
  document.getElementById('sec-title').textContent  = T.recent;
  document.getElementById('sec-all').textContent    = T.seeAll;
  document.getElementById('act-lend').textContent   = T.lendAct;
  document.getElementById('act-borrow').textContent = T.borrowAct;
  document.getElementById('act-list').textContent   = T.listTab;
  document.getElementById('act-hist').textContent   = T.histTab;
  document.getElementById('nb-gave-lbl').textContent  = T.lendBtn;
  document.getElementById('nb-took-lbl').textContent  = T.borrowBtn;
  document.getElementById('nb-hist-lbl').textContent  = T.histTab;
  document.getElementById('loans-title').textContent  = T.loans;
  document.getElementById('hist-title-el').textContent= T.histTab;
  document.getElementById('tab-all').querySelector('span').textContent  = T.all;
  document.getElementById('tab-gave').querySelector('span').textContent = T.lendBtn;
  document.getElementById('tab-took').querySelector('span').textContent = T.borrowBtn;
  document.getElementById('f-p').placeholder = T.namePh;
  document.getElementById('sv-btn').innerHTML = `<i class="ri-check-line"></i> ${T.save}`;
  document.getElementById('det-paid-txt').textContent = T.markPaid;
  if(appReady) loadHome();
}

// ── Init ──
async function init(){
  if(tgUser.first_name){
    const n=tgUser.first_name+(tgUser.last_name?' '+tgUser.last_name:'');
    document.getElementById('uname').textContent=n;
    document.getElementById('av').textContent=tgUser.first_name[0].toUpperCase();
  }
  initTheme();
  try{
    const me = await api('GET','/api/me');
    applyLang(me.language);
  }catch{
    applyLang(detectLang(tgUser.language_code));
  }
  appReady=true;
  loadHome();
}

// ── API ──
async function api(m,p,b){
  const r=await fetch(p,{method:m,headers:{'Content-Type':'application/json','X-Init-Data':initData},body:b?JSON.stringify(b):undefined});
  if(!r.ok) throw new Error(r.status);
  return r.json();
}

// ── Load ──
async function loadHome(){
  document.getElementById('home-lst').innerHTML=spin();
  try{
    const[sum,loans]=await Promise.all([api('GET','/api/summary'),api('GET','/api/loans?loan_type=all&paid=false')]);
    loans.forEach(l=>lmap[l.id]=l);
    const b=sum.balance;
    const el=document.getElementById('bal-amt');
    el.textContent=(b<0?'−':'')+fmtN(Math.abs(b))+' '+T.sum;
    el.className='bal-amt'+(b<0?' neg':'');
    document.getElementById('s-gave').textContent=fmtN(sum.total_gave)+' '+T.sum;
    document.getElementById('s-took').textContent=fmtN(sum.total_took)+' '+T.sum;
    renderLst('home-lst',loans.slice(0,7));
  }catch{document.getElementById('home-lst').innerHTML=errEl();}
}

async function loadLoans(t='all'){
  document.getElementById('loans-lst').innerHTML=spin();
  try{
    const loans=await api('GET',`/api/loans?loan_type=${t}&paid=false`);
    loans.forEach(l=>lmap[l.id]=l);
    renderLst('loans-lst',loans);
  }catch{document.getElementById('loans-lst').innerHTML=errEl();}
}

async function loadHist(){
  document.getElementById('hist-lst').innerHTML=spin();
  try{
    const loans=await api('GET','/api/history');
    if(!loans.length){document.getElementById('hist-lst').innerHTML=emptyEl('ri-inbox-2-line',T.noPaid);return;}
    document.getElementById('hist-lst').innerHTML=loans.map(r=>{
      const cls=r.loan_type,icon=cls==='gave'?'ri-arrow-up-circle-fill':'ri-arrow-down-circle-fill';
      return lc(r.id,'paid',icon,r.person_name,
        `<div class="lcard-sub"><i class="ri-check-double-line"></i>${(r.paid_at||'').slice(0,10)}</div>`,
        fmtN(r.amount),false,cls);
    }).join('');
  }catch{document.getElementById('hist-lst').innerHTML=errEl();}
}

// ── Render ──
function renderLst(id,loans){
  if(!loans.length){document.getElementById(id).innerHTML=emptyEl('ri-check-double-line',T.noLoans);return;}
  document.getElementById(id).innerHTML=loans.map(r=>{
    const cls=r.loan_type, icon=cls==='gave'?'ri-arrow-up-circle-fill':'ri-arrow-down-circle-fill';
    let sub='',cc='';
    if(r.due_date){
      const d=daysDiff(r.due_date);
      if(d<0){sub=`<div class="lcard-sub red"><i class="ri-error-warning-line"></i>${T.overdue.replace('{n}',Math.abs(d))}</div>`;cc='overdue';}
      else if(d===0){sub=`<div class="lcard-sub red"><i class="ri-alarm-warning-line"></i>${T.today}</div>`;cc='overdue';}
      else if(d<=3){sub=`<div class="lcard-sub yel"><i class="ri-time-line"></i>${fmtDate(r.due_date)} — ${T.soon.replace('{n}',d)}</div>`;cc='soon';}
      else{sub=`<div class="lcard-sub"><i class="ri-calendar-check-line"></i>${fmtDate(r.due_date)}</div>`;}
    }else{
      sub=`<div class="lcard-sub"><i class="ri-user-line"></i>${esc(cls==='gave'?T.lentType:T.borrowType)}</div>`;
    }
    return lc(r.id,cls,icon,r.person_name,sub,fmtN(r.amount),true,cls,cc);
  }).join('');
}

function lc(id,iCls,icon,name,sub,amt,clickable,amtCls,extraCls=''){
  const oc=clickable?`onclick="showDet('${id}')"`:'';
  return `<div class="lcard ${extraCls}" ${oc}>
    <div class="lcard-ic ${iCls}"><i class="${icon}"></i></div>
    <div class="lcard-body"><div class="lcard-name">${esc(name)}</div>${sub}</div>
    <div class="lcard-right"><div class="lcard-amt ${amtCls||''}">${amt}</div><div class="lcard-cur">${T.sum}</div></div>
  </div>`;
}

// ── Detail ──
function showDet(id){
  const r=lmap[id]; if(!r) return; sel=r;
  const gave=r.loan_type==='gave';
  const badge=document.getElementById('d-badge');
  badge.className='det-badge '+(gave?'gave':'took');
  badge.querySelector('i').className=gave?'ri-send-plane-fill':'ri-download-fill';
  document.getElementById('d-type-txt').textContent=gave?T.lentType:T.borrowType;
  document.getElementById('d-name').textContent=r.person_name;
  document.getElementById('d-amt').textContent=fmtN(r.amount)+' '+T.sum;
  document.getElementById('d-amt').className='det-amt '+(gave?'gave':'took');
  const dd=document.getElementById('d-desc');
  if(r.description){dd.style.display='flex';dd.querySelector('span').textContent=r.description;}
  else dd.style.display='none';
  const ddate=document.getElementById('d-date');
  if(r.due_date){ddate.style.display='flex';ddate.querySelector('span').textContent=T.dueLabel+fmtDate(r.due_date);}
  else ddate.style.display='none';
  document.getElementById('d-when').querySelector('span').textContent=T.addedLabel+(r.created_at||'').slice(0,10);
  document.getElementById('det-ov').classList.add('open');
}

function closeDet(){document.getElementById('det-ov').classList.remove('open');sel=null;}

async function doPaid(){
  if(!sel) return;
  try{
    await api('PATCH',`/api/loans/${sel.id}/paid`);
    delete lmap[sel.id]; closeDet();
    toast(T.paid);
    tg?.HapticFeedback?.notificationOccurred('success');
    loadHome();
    if(document.getElementById('s-loans').classList.contains('active')) loadLoans(curFilt);
  }catch{toast(T.err);}
}

// ── Add ──
function openAdd(t='gave'){
  amtStr=''; updateAmt();
  setType(t);
  document.getElementById('f-p').value='';
  document.getElementById('f-dt').value=new Date().toISOString().split('T')[0];
  setScr('s-add');
  setNb('');
  tg?.BackButton?.show();
  tg?.BackButton?.onClick(closeAdd);
}

function closeAdd(){
  tg?.BackButton?.hide();
  goHome();
}

function setType(t){
  curType=t;
  const gave=t==='gave';
  document.getElementById('m-title').textContent=gave?T.addLend:T.addBorrow;
  document.getElementById('amt-d').className='amt-num '+t;
  document.getElementById('amt-box').className='amt-box '+t;
}

function np(v){
  if(v==='del') amtStr=amtStr.slice(0,-1);
  else if(v==='000'){if(amtStr) amtStr+='000';}
  else{if(amtStr.length<12) amtStr+=v;}
  updateAmt();
}
function updateAmt(){document.getElementById('amt-d').textContent=fmtN(parseInt(amtStr||'0'));}

async function saveLoan(){
  const amount=parseInt(amtStr||'0'), person=document.getElementById('f-p').value.trim();
  if(!person){toast(T.noName);document.getElementById('f-p').focus();return;}
  if(amount<100){toast(T.noAmt);return;}
  const btn=document.getElementById('sv-btn');
  btn.disabled=true; btn.innerHTML=`<i class="ri-loader-4-line"></i> ${T.saving}`;
  try{
    const loan=await api('POST','/api/loans',{
      loan_type:curType, person_name:person, amount,
      description:'',
      due_date:document.getElementById('f-dt').value||null,
    });
    lmap[loan.id]=loan;
    toast(curType==='gave'?T.savedLend:T.savedBorrow);
    tg?.HapticFeedback?.notificationOccurred('success');
    closeAdd();
    loadHome();
  }catch{toast(T.err);}
  finally{btn.disabled=false;btn.innerHTML=`<i class="ri-check-line"></i> ${T.save}`;}
}

// ── Nav ──
function setScr(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function setNb(id){document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));if(id)document.getElementById(id)?.classList.add('on');}

function goHome(){setScr('s-home');setNb('nb-home');loadHome();}

function goLoans(t){
  setScr('s-loans');setNb('nb-'+(t||'home'));
  if(t){
    curFilt=t;
    const idx=t==='gave'?1:2;
    document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',i===idx));
  }
  loadLoans(curFilt);
}
function goHist(){setScr('s-hist');setNb('nb-hist');loadHist();}

function filt(t,btn){
  curFilt=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  loadLoans(t);
}

// ── Utils ──
function fmtN(n){return Math.floor(n||0).toLocaleString('ru-RU');}
function fmtDate(s){if(!s)return'';const[y,m,d]=s.split('-');return`${d}.${m}.${y}`;}
function daysDiff(s){return Math.round((new Date(s)-new Date(new Date().toDateString()))/864e5);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function spin(){return'<div class="spn-w"><div class="spn"></div></div>';}
function emptyEl(ic,txt){return`<div class="empty"><i class="${ic}"></i><p>${txt}</p></div>`;}
function errEl(){return emptyEl('ri-wifi-off-line',T.netErr);}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

init();
</script>
</body>
</html>
